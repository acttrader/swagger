info:
    contact:
        email: support@acttrader.com
        name: API Support
    description: This is a ActTrader API based on the OpenAPI 3.0 specification.
    title: ActTrader API
    version: "3.0"
paths:
    /accounts:
        get:
            description: Get Accounts
            parameters:
                - description: Account ID
                  in: query
                  name: account
                  type: integer
                - description: Trader ID
                  in: query
                  name: trader_id
                  type: integer
                - description: Limit
                  in: query
                  name: limit
                  type: integer
            produces:
                - application/json
            responses:
                "200":
                    description: OK
                    schema:
                        $ref: '#/definitions/model.ApiAccounts'
                "401":
                    description: Unauthorized
                    schema:
                        $ref: '#/definitions/model.ErrorJson'
            security:
                - ApiKeyAuth: []
            tags:
                - user
    /currencies:
        get:
            description: Get Currencies
            produces:
                - application/json
            responses:
                "200":
                    description: OK
                    schema:
                        $ref: '#/definitions/model.ApiCurrencyResponse'
                "401":
                    description: Unauthorized
                    schema:
                        $ref: '#/definitions/model.ErrorJson'
            security:
                - ApiKeyAuth: []
            tags:
                - market
    /department_instruments:
        get:
            description: Get Department Instruments (only for administrators)
            parameters:
                - description: Department ID
                  in: path
                  name: department_id
                  required: true
                  type: integer
                - description: Instrument ID
                  in: path
                  name: instrument_id
                  required: true
                  type: integer
                - description: Limit
                  in: query
                  name: limit
                  type: integer
                - description: Offset
                  in: query
                  name: offset
                  type: integer
            produces:
                - application/json
            responses:
                "200":
                    description: OK
                    schema:
                        $ref: '#/definitions/model.ApiDepartmentInstruments'
                "401":
                    description: Unauthorized
                    schema:
                        $ref: '#/definitions/model.ErrorJson'
            security:
                - ApiKeyAuth: []
            tags:
                - administration
        put:
            description: Update Department Instruments (only for administrators)
            parameters:
                - description: department instrument data JSON
                  in: body
                  name: execution
                  required: true
                  schema:
                    $ref: '#/definitions/model.UpdateDepartmentInstrument'
            produces:
                - application/json
            responses:
                "200":
                    description: OK
                    schema:
                        $ref: '#/definitions/model.UpdateDepartmentInstrument'
                "401":
                    description: Unauthorized
                    schema:
                        $ref: '#/definitions/model.ErrorJson'
            security:
                - ApiKeyAuth: []
            tags:
                - administration
